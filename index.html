<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doky | Your Administrative Guide in Cameroon</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/umd/lucide.min.js"></script>
    <style>
        :root {
            --primary: #0046ad; /* Trusting Blue */
            --secondary: #f48120; /* Action Orange */
            --mtn-yellow: #ffcb05;
            --orange-money: #ff6600;
            --text-dark: #1a1a1a;
            --text-light: #666666;
            --bg-light: #f8faff;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 600px; /* Mobile-first constraint */
            margin: 0 auto;
            background: var(--white);
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* Header */
        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            background: white;
            z-index: 100;
        }

        .logo {
            font-weight: 800;
            font-size: 24px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .lang-switch {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-light);
        }

        /* Hero Section */
        .hero {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(180deg, #eef4ff 0%, #ffffff 100%);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 15px;
            color: var(--primary);
            line-height: 1.2;
        }

        .hero p {
            color: var(--text-light);
            margin-bottom: 25px;
            font-size: 17px;
        }

        .btn-main {
            background: var(--primary);
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,70,173,0.3);
        }

        /* Features */
        .section-title {
            padding: 20px;
            font-size: 20px;
            font-weight: 700;
            border-left: 5px solid var(--secondary);
            margin-left: 20px;
        }

        .features {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            padding: 20px;
        }
